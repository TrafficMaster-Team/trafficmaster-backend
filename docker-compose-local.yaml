x-default: &default
  restart: unless-stopped
  networks:
    - overlay

x-health-check-interval: &hc-interval
  interval: 30s
  timeout: 60s
  retries: 5
  start_period: 10s

x-postgres-environment: &x-db-env
  POSTGRES_USER: $POSTGRES_USER
  POSTGRES_PASSWORD: $POSTGRES_PASSWORD
  POSTGRES_HOST: $POSTGRES_HOST
  POSTGRES_PORT: $POSTGRES_PORT
  POSTGRES_DB: $POSTGRES_DB


services:
  postgres:
    <<: *default
    image: postgres:16-alpine3.22
    environment:
      <<: *x-db-env
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      <<: *hc-interval
    ports:
      - 127.0.0.1:${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - trafficmaster.db.data:/var/lib/postgresql/data

volumes:
  trafficmaster.db.data: {}

networks:
  overlay:
    driver: bridge